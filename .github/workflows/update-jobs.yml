name: Refresh job board

on:
  schedule:
    - cron: "17 10 * * *" # 6:17 a.m. Toronto during daylight time
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/update-jobs.yml"

permissions:
  contents: write

concurrency:
  group: refresh-job-board
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch, filter and rank jobs
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scripts/update_jobs.py
      - name: Validate output
        run: python -m unittest discover -s tests -v
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/jobs.json data/source_health.json; then
            echo "No job data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/source_health.json
          git commit -m "chore: refresh job postings"
          git push
